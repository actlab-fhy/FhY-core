[tox]
envlist = lint, type, coverage, py{310, 311, 312, 313, 314}-tests

[testenv]
description = Run Unit Tests
extras = test
set_env =
    COVERAGE_PROCESS_START={toxinidir}/pyproject.toml
commands_pre =
    {envpython} --version
commands =
    coverage run -m pytest -m "slow or not slow" {posargs}

[testenv:py{310, 311, 312, 313, 314}-tests]
commands_pre =
    {envpython} --version
    python -c 'import pathlib; pathlib.Path("{env_site_packages_dir}/cov.pth").write_text("import coverage; coverage.process_startup()")'

[testenv:coverage]
description = Report Code Coverage
skip_install = true
deps = coverage
parallel_show_output = true
depends = py{310, 311, 312, 313, 314}-tests
commands =
    coverage combine
    coverage report {posargs}
    coverage xml

[testenv:lint]
description = Run Code Linters
extras = lint
commands =
    ruff check --config pyproject.toml {posargs: src tests}
    ruff format --check --config pyproject.toml {posargs: src tests}
    pylint --rcfile pyproject.toml {posargs: src tests}

[testenv:type]
description = Static Type Analysis
extras = type
commands =
    mypy --config-file pyproject.toml {posargs: src tests}
